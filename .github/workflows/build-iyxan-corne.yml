name: Build Iyxan's Corne
on: workflow_dispatch
jobs:
  build:
    uses: ./.github/workflows/main.yml
    secrets: inherit
    with:
      alphas: '["QWERTY"]'
      tap: '["QWERTY"]'
      board: '["nice_nano_v2"]'
      shield: '["corne_left","corne_right"]'
      kconfig: '["CONFIG_ZMK_DISPLAY=y\nCONFIG_ZMK_STUDIO_LOCKING=n\nCONFIG_ZMK_STUDIO=y\nCONFIG_BT_CTLR_TX_PWR_PLUS_8=y\nCONFIG_ZMK_IDLE_TIMEOUT=180000\nCONFIG_ZMK_SLEEP=y\nCONFIG_ZMK_IDLE_SLEEP_TIMEOUT=9000000\nCONFIG_ZMK_PM_SOFT_OFF=y\nCONFIG_ZMK_POINTING=y"]'
      snippet: '["studio-rpc-usb-uart"]'
      branches: '["zmkfirmware/zmk/v0.3"]'
